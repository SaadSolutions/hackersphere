<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - HackerSphere Shop</title>
    <link rel="stylesheet" href="/shop/styles.css">
    <style>
        .product-page { max-width: 1100px; margin: 100px auto 60px; padding: 0 20px; }
        .breadcrumb { color: var(--text-muted); font-size: 0.85rem; font-family: 'Courier New', monospace; margin-bottom: 28px; }
        .breadcrumb a { color: var(--matrix-green); text-decoration: none; }
        .breadcrumb span { margin: 0 8px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; margin-bottom: 60px; }
        .product-gallery { position: sticky; top: 100px; }
        .main-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.4); }
        .thumbnail-strip { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .thumbnail { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 2px solid var(--glass-border); cursor: pointer; transition: border-color 0.2s; }
        .thumbnail:hover, .thumbnail.active { border-color: var(--matrix-green); }
        .product-info h1 { color: var(--text-primary); font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
        .product-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .product-rating { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 0.9rem; }
        .stars { color: #ffd700; }
        .product-category { background: rgba(0,255,0,0.1); border: 1px solid rgba(0,255,0,0.3); color: var(--matrix-green); padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-family: 'Courier New', monospace; }
        .product-price-block { margin: 20px 0; }
        .price-current { font-size: 2.2rem; color: var(--matrix-green); font-family: 'Courier New', monospace; font-weight: 700; }
        .price-compare { font-size: 1.1rem; color: var(--text-muted); text-decoration: line-through; margin-left: 12px; }
        .price-save { font-size: 0.9rem; color: #00ff88; margin-left: 10px; }
        .product-description { color: var(--text-secondary); line-height: 1.7; margin-bottom: 24px; font-size: 0.95rem; }
        .stock-badge { display: inline-flex; align-items: center; gap: 6px; font-family: 'Courier New', monospace; font-size: 0.85rem; margin-bottom: 20px; }
        .stock-badge.in-stock { color: #00ff88; }
        .stock-badge.low-stock { color: #ffaa00; }
        .stock-badge.out-of-stock { color: #ff4444; }
        .quantity-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .qty-label { color: var(--text-secondary); font-size: 0.9rem; }
        .qty-controls { display: flex; align-items: center; border: 1px solid var(--glass-border); border-radius: 8px; overflow: hidden; }
        .qty-btn { width: 36px; height: 36px; background: rgba(0,255,0,0.1); border: none; color: var(--matrix-green); cursor: pointer; font-size: 1.1rem; transition: background 0.2s; }
        .qty-btn:hover { background: rgba(0,255,0,0.2); }
        .qty-value { width: 48px; text-align: center; background: transparent; border: none; border-left: 1px solid var(--glass-border); border-right: 1px solid var(--glass-border); color: var(--text-primary); font-family: 'Courier New', monospace; font-size: 1rem; padding: 6px; }
        .btn-add-cart { width: 100%; padding: 16px; background: var(--matrix-green); color: #000; border: none; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-bottom: 10px; }
        .btn-add-cart:hover:not(:disabled) { background: #00dd00; box-shadow: 0 0 20px rgba(0,255,0,0.4); }
        .btn-add-cart:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-buy-now { width: 100%; padding: 14px; background: transparent; color: var(--matrix-green); border: 1px solid var(--matrix-green); border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-buy-now:hover { background: rgba(0,255,0,0.1); }
        .product-features { margin-top: 28px; }
        .product-features h3 { color: var(--matrix-green); font-family: 'Courier New', monospace; font-size: 0.95rem; letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase; }
        .features-list { list-style: none; padding: 0; }
        .features-list li { color: var(--text-secondary); padding: 6px 0; font-size: 0.9rem; display: flex; align-items: flex-start; gap: 8px; }
        .features-list li::before { content: '▶'; color: var(--matrix-green); font-size: 0.7rem; margin-top: 3px; flex-shrink: 0; }
        .tabs { margin-top: 60px; }
        .tab-nav { display: flex; border-bottom: 1px solid var(--glass-border); margin-bottom: 28px; }
        .tab-btn { padding: 12px 24px; background: none; border: none; color: var(--text-muted); font-family: 'Courier New', monospace; font-size: 0.9rem; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: var(--matrix-green); border-bottom-color: var(--matrix-green); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .spec-table { width: 100%; border-collapse: collapse; }
        .spec-table tr:nth-child(even) { background: rgba(0,255,0,0.03); }
        .spec-table td { padding: 10px 14px; color: var(--text-secondary); font-size: 0.9rem; border-bottom: 1px solid var(--glass-border); }
        .spec-table td:first-child { color: var(--text-primary); font-weight: 600; width: 40%; }
        .review-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
        .review-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .reviewer-name { color: var(--text-primary); font-weight: 600; font-size: 0.9rem; }
        .review-date { color: var(--text-muted); font-size: 0.8rem; margin-left: auto; }
        .review-text { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }
        .review-form { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 20px; }
        .review-form h4 { color: var(--matrix-green); font-family: 'Courier New', monospace; margin-bottom: 16px; }
        .star-rating { display: flex; flex-direction: row-reverse; gap: 4px; margin-bottom: 12px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 1.8rem; cursor: pointer; color: var(--glass-border); transition: color 0.1s; }
        .star-rating label:hover, .star-rating label:hover ~ label,
        .star-rating input:checked ~ label { color: #ffd700; }
        .related-section { margin-top: 60px; }
        .related-section h2 { color: var(--text-primary); font-size: 1.3rem; margin-bottom: 24px; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .loading-skeleton { background: linear-gradient(90deg, rgba(0,255,0,0.05) 25%, rgba(0,255,0,0.1) 50%, rgba(0,255,0,0.05) 75%); background-size: 200% 100%; animation: skeleton 1.5s infinite; border-radius: 8px; height: 200px; }
        @keyframes skeleton { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .toast { position: fixed; bottom: 24px; right: 24px; background: #000; border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 12px 20px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.9rem; transform: translateY(100px); transition: transform 0.3s; z-index: 1000; }
        .toast.show { transform: translateY(0); }
        @media (max-width: 768px) {
            .product-grid { grid-template-columns: 1fr; gap: 28px; }
            .product-gallery { position: static; }
        }
    </style>
</head>
<body>
    <header class="nav-header">
        <nav class="nav-container">
            <a href="/" class="nav-logo">HACKERSPHERE</a>
            <div class="nav-links">
                <a href="/shop" class="nav-link">Shop</a>
                <a href="/academy/catalog.html" class="nav-link">Academy</a>
                <a href="/shop/cart.html" class="nav-link cart-link">Cart <span id="cart-count" class="cart-badge" style="display:none;"></span></a>
            </div>
        </nav>
    </header>

    <main class="product-page">
        <div class="breadcrumb" id="breadcrumb">
            <a href="/shop">Shop</a> <span>›</span>
            <span id="bc-category"></span> <span>›</span>
            <span id="bc-product">Loading...</span>
        </div>

        <div id="product-content">
            <div class="loading-skeleton" style="height: 400px;"></div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="/shop/api.js"></script>
    <script src="/shop/product.js"></script>
</body>
</html>
