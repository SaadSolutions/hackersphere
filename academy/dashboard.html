<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackerSphere - Learning Dashboard</title>

    <!-- Preload critical CSS -->
    <link rel="preload" href="styles.css" as="style">
    <link rel="preload" href="academy/styles.css" as="style">

    <!-- Load styles -->
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Hacker Matrix Rain Background -->
    <canvas id="matrix-canvas"></canvas>

    <!-- Header -->
    <header class="academy-header">
        <nav class="academy-nav academy-container">
            <a href="/" class="academy-title">HACKERSPHERE</a>

            <div class="academy-nav-links">
                <a href="/academy/catalog" class="academy-nav-link" data-page="catalog">Catalog</a>
                <a href="/academy/dashboard" class="academy-nav-link active" data-page="dashboard">Dashboard</a>
                <button id="auth-button" class="academy-button small secondary">Login</button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="academy-main">
        <!-- Welcome Section -->
        <section class="academy-section">
            <div class="academy-container">
                <div id="welcome-section" class="dashboard-welcome">
                    <!-- Welcome message will be populated here -->
                </div>
            </div>
        </section>

        <!-- Statistics Overview -->
        <section class="academy-section">
            <div class="academy-container">
                <div id="stats-overview" class="stats-overview">
                    <!-- Statistics will be populated here -->
                </div>
            </div>
        </section>

        <!-- Current Learning -->
        <section class="academy-section">
            <div class="academy-container">
                <h2 class="section-title">Continue Learning</h2>
                <div id="current-learning" class="current-learning">
                    <!-- Current courses will be populated here -->
                </div>
            </div>
        </section>

        <!-- Recent Activity -->
        <section class="academy-section">
            <div class="academy-container">
                <h2 class="section-title">Recent Activity</h2>
                <div id="recent-activity" class="recent-activity">
                    <!-- Recent activity will be populated here -->
                </div>
            </div>
        </section>

        <!-- Achievements & Certificates -->
        <section class="academy-section">
            <div class="academy-container">
                <h2 class="section-title">Achievements</h2>
                <div id="achievements-section" class="achievements-section">
                    <!-- Certificates and achievements will be populated here -->
                </div>
            </div>
        </section>

        <!-- Quick Actions -->
        <section class="academy-section">
            <div class="academy-container">
                <div id="quick-actions" class="quick-actions">
                    <h2 class="section-title">Quick Actions</h2>
                    <div class="action-buttons">
                        <button class="academy-button action-btn" onclick="UserDashboard.browseCourses()">
                            Browse Courses
                        </button>
                        <button class="academy-button action-btn secondary" onclick="UserDashboard.viewCertificates()">
                            View Certificates
                        </button>
                        <button class="academy-button action-btn secondary" onclick="UserDashboard.viewProgress()">
                            Learning Progress
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../code.js"></script>
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script src="utils.js"></script>
    <script src="progress.js"></script>
    <script src="dashboard.js"></script>

    <script>
        // Initialize dashboard page
        document.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            const isAuthenticated = window.AcademyAPI.isAuthenticated();

            if (!isAuthenticated) {
                showLoginRequired();
                return;
            }

            // Update auth button
            updateAuthButton();

            // Handle auth button clicks
            document.getElementById('auth-button').addEventListener('click', async () => {
                await window.AcademyAuth.logout();
                window.location.href = '/';
            });

            // Initialize dashboard
            await UserDashboard.init();

            function updateAuthButton() {
                const authButton = document.getElementById('auth-button');
                authButton.textContent = 'Logout';
            }

            function showLoginRequired() {
                const welcomeSection = document.getElementById('welcome-section');
                welcomeSection.innerHTML = `
                    <div class="text-center" style="padding: var(--spacing-xxl);">
                        <h2 style="color: var(--warning-orange); margin-bottom: var(--spacing-lg);">
                            Authentication Required
                        </h2>
                        <p style="color: var(--text-secondary); margin-bottom: var(--spacing-lg);">
                            Please log in to access your learning dashboard and track your progress.
                        </p>
                        <button onclick="window.AcademyAuth.login('demo_user', 'password').then(() => location.reload())" class="academy-button">
                            Login as Demo User
                        </button>
                    </div>
                `;

                // Hide other sections until logged in
                ['stats-overview', 'current-learning', 'recent-activity', 'achievements-section', 'quick-actions'].forEach(id => {
                    const element = document.getElementById(id);
                    if (element) element.style.display = 'none';
                });
            }
        });

        // Setup router for navigation
        if (window.AcademyRouter) {
            window.AcademyRouter.addRoute('dashboard', () => {
                if (window.AcademyAPI.isAuthenticated()) {
                    UserDashboard.init();
                }
            });
        }
    </script>

    <style>
    /* Dashboard Welcome Section */
    .dashboard-welcome {
        text-align: center;
        padding: var(--spacing-xxl) 0;
        background: var(--hacker-grey);
        border: 1px solid var(--matrix-green);
        border-radius: var(--radius-lg);
        margin-bottom: var(--spacing-xl);
    }

    .welcome-message {
        margin-bottom: var(--spacing-lg);
    }

    .welcome-title {
        font-size: 2.5rem;
        color: var(--matrix-green);
        margin-bottom: var(--spacing-md);
        text-shadow: 0 0 10px var(--matrix-green-glow);
        font-family: var(--font-mono);
    }

    .welcome-subtitle {
        font-size: 1.2rem;
        color: var(--text-secondary);
        max-width: 600px;
        margin: 0 auto;
    }

    .streak-highlight {
        background: var(--hacker-grey-light);
        border: 2px solid var(--error-red);
        border-radius: var(--radius-md);
        padding: var(--spacing-lg);
        margin-top: var(--spacing-lg);
        display: inline-block;
    }

    .streak-highlight h3 {
        color: var(--error-red);
        margin-bottom: var(--spacing-sm);
        font-size: 1.5rem;
    }

    /* Stats Overview */
    .stats-overview {
        margin-bottom: var(--spacing-xl);
    }

    /* Current Learning Section */
    .current-learning {
        display: grid;
        gap: var(--spacing-lg);
    }

    .current-course-item {
        background: var(--hacker-grey);
        border: 1px solid var(--matrix-green);
        border-radius: var(--radius-lg);
        padding: var(--spacing-lg);
        transition: all 0.3s ease;
        cursor: pointer;
    }

    .current-course-item:hover {
        border-color: var(--matrix-green-light);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
    }

    .current-course-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: var(--spacing-md);
    }

    .current-course-title {
        font-size: 1.2rem;
        color: var(--matrix-green);
        margin-bottom: var(--spacing-sm);
        flex: 1;
    }

    .current-course-progress {
        background: var(--matrix-green);
        color: black;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 0.9rem;
        font-weight: bold;
        text-transform: uppercase;
        font-family: var(--font-mono);
    }

    .current-course-meta {
        color: var(--text-dim);
        font-size: 0.9rem;
        margin-bottom: var(--spacing-md);
    }

    .continue-button {
        width: 100%;
        text-align: center;
        margin-top: var(--spacing-md);
    }

    /* Recent Activity */
    .recent-activity {
        background: var(--hacker-grey);
        border: 1px solid var(--matrix-green);
        border-radius: var(--radius-lg);
        padding: var(--spacing-lg);
    }

    .activity-list {
        display: grid;
        gap: var(--spacing-md);
    }

    .activity-item {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        padding: var(--spacing-sm);
        border-bottom: 1px solid rgba(0, 255, 0, 0.2);
    }

    .activity-item:last-child {
        border-bottom: none;
    }

    .activity-icon {
        font-size: 1.5rem;
        width: 30px;
        text-align: center;
    }

    .activity-content {
        flex: 1;
    }

    .activity-title {
        color: var(--text-primary);
        font-weight: bold;
        margin-bottom: 2px;
    }

    .activity-description {
        color: var(--text-secondary);
        font-size: 0.9rem;
    }

    .activity-time {
        color: var(--text-dim);
        font-size: 0.8rem;
        font-family: var(--font-mono);
    }

    .empty-activity {
        text-align: center;
        padding: var(--spacing-xl);
        color: var(--text-dim);
    }

    /* Achievements Section */
    .achievements-section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: var(--spacing-lg);
    }

    .achievement-card {
        background: var(--hacker-grey);
        border: 1px solid var(--matrix-green);
        border-radius: var(--radius-lg);
        padding: var(--spacing-lg);
        text-align: center;
        transition: all 0.3s ease;
    }

    .achievement-card:hover {
        border-color: var(--matrix-green-light);
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
    }

    .achievement-icon {
        font-size: 3rem;
        margin-bottom: var(--spacing-md);
    }

    .achievement-title {
        color: var(--matrix-green);
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: var(--spacing-sm);
    }

    .achievement-description {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: var(--spacing-md);
    }

    .achievement-date {
        color: var(--text-dim);
        font-size: 0.8rem;
        font-family: var(--font-mono);
    }

    .certificate-link {
        display: inline-block;
        margin-top: var(--spacing-sm);
        color: var(--matrix-green);
        text-decoration: none;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-family: var(--font-mono);
        padding: 4px 8px;
        border: 1px solid var(--matrix-green);
        border-radius: 4px;
        transition: all 0.3s ease;
    }

    .certificate-link:hover {
        background: var(--matrix-green);
        color: black;
        text-decoration: none;
    }

    /* Quick Actions */
    .quick-actions {
        background: var(--hacker-grey);
        border: 1px solid var(--matrix-green);
        border-radius: var(--radius-lg);
        padding: var(--spacing-xl);
        text-align: center;
    }

    .action-buttons {
        display: flex;
        justify-content: center;
        gap: var(--spacing-md);
        flex-wrap: wrap;
        margin-top: var(--spacing-lg);
    }

    .action-btn {
        flex: 1;
        min-width: 150px;
    }

    /* Empty States */
    .empty-courses,
    .empty-achievements {
        text-align: center;
        padding: var(--spacing-xl);
        color: var(--text-dim);
    }

    .empty-courses h3,
    .empty-achievements h3 {
        color: var(--text-secondary);
        margin-bottom: var(--spacing-md);
    }

    /* Learning Progress Visualization */
    .learning-chart {
        margin: var(--spacing-lg) 0;
        height: 200px;
    }

    .progress-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: var(--spacing-lg);
        margin-top: var(--spacing-lg);
    }

    /* Loading states */
    @media (prefers-reduced-motion: reduce) {
        .current-course-item,
        .achievement-card {
            transition: none;
        }

        .current-course-item:hover,
        .achievement-card:hover {
            transform: none;
            box-shadow: none;
        }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .welcome-title {
            font-size: 2rem;
        }

        .current-course-header {
            flex-direction: column;
            gap: var(--spacing-md);
            align-items: flex-start;
        }

        .current-course-progress {
            align-self: flex-end;
        }

        .achievements-section {
            grid-template-columns: 1fr;
        }

        .action-buttons {
            flex-direction: column;
            align-items: center;
        }

        .action-btn {
            width: 100%;
            max-width: 300px;
        }

        .stats-overview {
            /* Stats grid is responsive by default */
        }
    }

    @media (max-width: 480px) {
        .dashboard-welcome {
            padding: var(--spacing-lg);
        }

        .welcome-title {
            font-size: 1.8rem;
        }

        .current-course-item,
        .achievement-card {
            padding: var(--spacing-md);
        }

        .activity-item {
            flex-direction: column;
            align-items: flex-start;
            gap: var(--spacing-sm);
        }

        .activity-icon {
            align-self: center;
        }
    }
    </style>
</body>
</html>
