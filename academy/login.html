<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackerSphere Academy - Login</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="academy-header">
        <nav class="academy-nav academy-container">
            <a href="/" class="academy-title">HACKERSPHERE</a>
            <div class="academy-nav-links" id="academy-nav-links">
                <a href="catalog.html" class="academy-nav-link">Catalog</a>
                <a href="register.html" class="academy-nav-link">Register</a>
            </div>
            <button class="academy-hamburger" id="academy-hamburger" aria-label="Toggle navigation" aria-expanded="false">☰</button>
        </nav>
        <div class="academy-mobile-nav" id="academy-mobile-nav">
            <a href="catalog.html" class="academy-nav-link">Catalog</a>
            <a href="register.html" class="academy-nav-link">Register</a>
        </div>
    </header>

    <!-- Login Form -->
    <main class="academy-main">
        <section class="academy-section">
            <div class="academy-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <h1 class="auth-title">ACCESS TERMINAL</h1>
                        <p class="auth-subtitle">Enter your credentials to continue</p>
                    </div>

                    <form id="login-form" class="auth-form" novalidate>
                        <div class="academy-form-group">
                            <label for="username" class="academy-label">Username or Email</label>
                            <input
                                type="text"
                                id="username"
                                name="username"
                                class="academy-input"
                                placeholder="your_handle"
                                autocomplete="username"
                                required
                            />
                            <span class="field-error" id="username-error" aria-live="polite"></span>
                        </div>

                        <div class="academy-form-group">
                            <label for="password" class="academy-label">Password</label>
                            <div class="password-wrapper">
                                <input
                                    type="password"
                                    id="password"
                                    name="password"
                                    class="academy-input"
                                    placeholder="••••••••"
                                    autocomplete="current-password"
                                    required
                                />
                                <button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">👁</button>
                            </div>
                            <span class="field-error" id="password-error" aria-live="polite"></span>
                        </div>

                        <div class="auth-options">
                            <label class="remember-label">
                                <input type="checkbox" id="remember-me" name="remember" />
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-link">Forgot password?</a>
                        </div>

                        <div id="login-error" class="auth-message error" role="alert" style="display:none;"></div>

                        <button type="submit" id="login-submit" class="academy-button full-width">
                            <span class="btn-text">Login</span>
                            <span class="btn-loading" style="display:none;">Authenticating...</span>
                        </button>
                    </form>

                    <div class="auth-footer">
                        <p>Don't have an account? <a href="register.html" class="auth-link">Register here</a></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script src="utils.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Redirect if already logged in
            if (window.AcademyAPI && window.AcademyAPI.isAuthenticated()) {
                const redirect = localStorage.getItem('post_login_redirect');
                // Validate redirect is same-origin before following it
                if (redirect && redirect.startsWith('/')) {
                    localStorage.removeItem('post_login_redirect');
                    window.location.href = redirect;
                } else {
                    window.location.href = 'dashboard.html';
                }
                return;
            }

            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('login-submit');
            const errorBox = document.getElementById('login-error');
            const togglePassword = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');

            // Toggle password visibility
            togglePassword.addEventListener('click', () => {
                const isVisible = passwordInput.type === 'text';
                passwordInput.type = isVisible ? 'password' : 'text';
                togglePassword.textContent = isVisible ? '👁' : '🙈';
                togglePassword.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
            });

            // Form submission
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearErrors();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                // Client-side validation
                let valid = true;
                if (!username) {
                    showFieldError('username-error', 'Username or email is required');
                    valid = false;
                }
                if (!password) {
                    showFieldError('password-error', 'Password is required');
                    valid = false;
                }
                if (!valid) return;

                // Disable button and show loading state
                setLoading(true);

                try {
                    await window.AcademyAuth.login(username, password);

                    // Redirect after login
                    const redirect = localStorage.getItem('post_login_redirect');
                    if (redirect && redirect.startsWith('/')) {
                        localStorage.removeItem('post_login_redirect');
                        window.location.href = redirect;
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } catch (error) {
                    showFormError(error.message || 'Invalid credentials. Please try again.');
                } finally {
                    setLoading(false);
                }
            });

            function showFieldError(id, message) {
                const el = document.getElementById(id);
                if (el) {
                    el.textContent = message;
                    el.style.display = 'block';
                }
            }

            function clearErrors() {
                document.getElementById('username-error').textContent = '';
                document.getElementById('password-error').textContent = '';
                errorBox.style.display = 'none';
                errorBox.textContent = '';
            }

            function showFormError(message) {
                errorBox.textContent = message;
                errorBox.style.display = 'block';
            }

            function setLoading(loading) {
                submitBtn.disabled = loading;
                submitBtn.querySelector('.btn-text').style.display = loading ? 'none' : 'inline';
                submitBtn.querySelector('.btn-loading').style.display = loading ? 'inline' : 'none';
            }

            // Mobile hamburger
            const hamburger = document.getElementById('academy-hamburger');
            const mobileNav = document.getElementById('academy-mobile-nav');
            if (hamburger && mobileNav) {
                hamburger.addEventListener('click', () => {
                    const isOpen = mobileNav.classList.toggle('open');
                    hamburger.setAttribute('aria-expanded', String(isOpen));
                    hamburger.textContent = isOpen ? '✕' : '☰';
                });
            }
        });
    </script>

    <style>
    /* Auth page layout */
    .academy-main {
        min-height: calc(100vh - 70px);
        display: flex;
        align-items: center;
    }

    .auth-card {
        max-width: 440px;
        margin: 0 auto;
        background: var(--hacker-grey);
        border: 1px solid var(--matrix-green);
        border-radius: var(--radius-lg);
        padding: var(--spacing-xxl);
        box-shadow: 0 0 40px rgba(0, 255, 0, 0.1);
    }

    .auth-header {
        text-align: center;
        margin-bottom: var(--spacing-xl);
    }

    .auth-title {
        font-family: var(--font-mono);
        font-size: 1.8rem;
        color: var(--matrix-green);
        text-shadow: 0 0 10px var(--matrix-green-glow);
        margin-bottom: var(--spacing-sm);
        letter-spacing: 2px;
    }

    .auth-subtitle {
        color: var(--text-dim);
        font-family: var(--font-mono);
        font-size: 0.9rem;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-lg);
    }

    .password-wrapper {
        position: relative;
    }

    .password-wrapper .academy-input {
        padding-right: 48px;
        width: 100%;
    }

    .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        padding: 4px;
        color: var(--text-dim);
    }

    .toggle-password:hover {
        color: var(--matrix-green);
    }

    .auth-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.9rem;
    }

    .remember-label {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        color: var(--text-secondary);
        cursor: pointer;
    }

    .forgot-link {
        color: var(--matrix-green);
        text-decoration: none;
        font-family: var(--font-mono);
        font-size: 0.85rem;
    }

    .forgot-link:hover {
        text-decoration: underline;
    }

    .auth-message {
        padding: var(--spacing-md);
        border-radius: var(--radius-sm);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        text-align: center;
    }

    .auth-message.error {
        background: rgba(255, 68, 68, 0.1);
        border: 1px solid var(--error-red);
        color: var(--error-red);
    }

    .auth-message.success {
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid var(--matrix-green);
        color: var(--matrix-green);
    }

    .field-error {
        display: none;
        color: var(--error-red);
        font-size: 0.85rem;
        font-family: var(--font-mono);
        margin-top: 4px;
    }

    .academy-button.full-width {
        width: 100%;
        justify-content: center;
    }

    .auth-footer {
        text-align: center;
        margin-top: var(--spacing-xl);
        color: var(--text-dim);
        font-size: 0.9rem;
    }

    .auth-link {
        color: var(--matrix-green);
        text-decoration: none;
        font-family: var(--font-mono);
    }

    .auth-link:hover {
        text-decoration: underline;
    }

    /* Mobile hamburger */
    .academy-hamburger {
        display: none;
        background: none;
        border: 1px solid var(--matrix-green);
        color: var(--matrix-green);
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1.3rem;
        line-height: 1;
    }

    .academy-mobile-nav {
        display: none;
        flex-direction: column;
        background: var(--hacker-grey);
        border-top: 1px solid var(--matrix-green);
        padding: 10px 0;
    }

    .academy-mobile-nav.open { display: flex; }

    .academy-mobile-nav .academy-nav-link {
        padding: 12px 24px;
        border-radius: 0;
        text-align: left;
    }

    @media (max-width: 768px) {
        .academy-nav-links { display: none !important; }
        .academy-hamburger { display: block; }

        .auth-card {
            padding: var(--spacing-xl);
        }

        .auth-options {
            flex-direction: column;
            gap: var(--spacing-md);
            align-items: flex-start;
        }
    }
    </style>
</body>
</html>
